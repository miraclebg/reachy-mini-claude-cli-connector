<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="theme-color" content="#0e0f12" />
<title>Reachy</title>
<style>
  :root {
    --orange: #FF9900; --green: #17b877; --amber: #f5a623;
    --blue: #3b9dff; --red: #ff5a5a; --grey: #8a8f98;
    --bg: #0e0f12; --card: #1a1c22; --line: #2a2d36; --fg: #eaeaea;
  }
  :root[data-theme="light"] {
    --bg: #f6f7f9; --card: #ffffff; --line: #e2e4ea; --fg: #1c1e22; --grey: #9aa0a8;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex; flex-direction: column;
    background: var(--bg); color: var(--fg);
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    -webkit-user-select: none; user-select: none;
  }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: .8rem 1rem; border-bottom: 1px solid var(--line); flex: 0 0 auto;
  }
  header .brand { font-weight: 600; font-size: 1rem; opacity: .85; }
  #status {
    display: flex; align-items: center; gap: .5rem;
    padding: .35rem .8rem; border-radius: 999px;
    background: var(--card); border: 1px solid var(--line);
    font-size: .85rem; font-weight: 500; transition: color .2s, border-color .2s;
  }
  #dot { width: .7rem; height: .7rem; border-radius: 50%; background: var(--grey); flex: 0 0 auto; }
  #status[data-state="idle"]           { color: var(--fg); }
  #status[data-state="listening"]      { color: #7ef0bd; border-color: #1c5f45; }
  #status[data-state="listening"] #dot { background: var(--green); animation: pulse 1s ease-in-out infinite; }
  #status[data-state="thinking"]       { color: #ffd98a; border-color: #6b5320; }
  #status[data-state="thinking"] #dot  { background: var(--amber); animation: blink .7s linear infinite; }
  #status[data-state="speaking"]       { color: #a9d6ff; border-color: #24557f; }
  #status[data-state="speaking"] #dot  { background: var(--blue); animation: pulse .55s ease-in-out infinite; }
  #status[data-state="error"]          { color: #ff9d9d; border-color: #7a2b2b; }
  #status[data-state="error"] #dot     { background: var(--red); }
  #status[data-state="offline"] #dot   { background: #555; }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: .6; } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .25; } }

  /* segmented Talk | Settings nav */
  nav.seg { display: flex; gap: .3rem; margin: .7rem 1rem 0; padding: .25rem;
            background: var(--card); border: 1px solid var(--line); border-radius: .8rem; flex: 0 0 auto; }
  .seg-btn { flex: 1; border: none; background: transparent; color: var(--fg);
             font: inherit; font-weight: 600; padding: .5rem 0; border-radius: .6rem;
             cursor: pointer; opacity: .7; }
  .seg-btn.on { background: var(--orange); color: #fff; opacity: 1; }

  main { flex: 1 1 auto; display: flex; flex-direction: column; overflow: hidden; }
  .tab { flex: 1 1 auto; display: flex; flex-direction: column; overflow: hidden; }
  .tab.hidden { display: none; }

  #log { flex: 1 1 auto; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: .6rem; }
  #empty { margin: auto; opacity: .35; font-size: .95rem; text-align: center; }
  .msg { max-width: 82%; padding: .6rem .85rem; border-radius: 1rem; font-size: 1rem; line-height: 1.35;
         white-space: pre-wrap; word-wrap: break-word; }
  .msg.you    { align-self: flex-end; background: #3a2c12; border: 1px solid #5a4520; border-bottom-right-radius: .3rem; }
  .msg.reachy { align-self: flex-start; background: var(--card); border: 1px solid var(--line); border-bottom-left-radius: .3rem; }
  .msg .who { display: block; font-size: .7rem; opacity: .5; margin-bottom: .15rem; }

  .placeholder { margin: auto; padding: 2rem; text-align: center; opacity: .5; font-size: .95rem; line-height: 1.5; }

  #cfg { padding: 1rem 1rem 2rem; overflow-y: auto; }
  .cfg-note { margin: 0 0 1rem; font-size: .85rem; opacity: .7; }
  .cfg-note.err { color: var(--red); opacity: 1; }
  .cfg-group { background: var(--card); border: 1px solid var(--line); border-radius: .8rem;
               padding: .3rem .9rem; margin-bottom: 1rem; }
  .cfg-label { font-size: .75rem; letter-spacing: .04em; text-transform: uppercase;
               opacity: .5; padding: .7rem 0 .2rem; }
  .cfg-row { display: flex; align-items: center; justify-content: space-between; gap: 1rem;
             padding: .7rem 0; border-bottom: 1px solid var(--line); font-size: .95rem; }
  .cfg-group .cfg-row:last-of-type { border-bottom: none; }
  .cfg-row em { opacity: .5; font-style: normal; font-size: .8rem; }
  .cfg-row input, .cfg-row select { background: var(--bg); color: var(--fg);
             border: 1px solid var(--line); border-radius: .5rem; padding: .4rem .5rem;
             font: inherit; min-width: 6.5rem; }
  .cfg-row input:disabled, .cfg-row select:disabled { opacity: .45; }
  .cfg-btn { width: 100%; padding: .7rem; margin: .3rem 0 .6rem; border: none; border-radius: .6rem;
             background: var(--amber); color: #1c1e22; font: inherit; font-weight: 600; cursor: pointer; }
  .cfg-btn:disabled { opacity: .45; cursor: default; }
  .cfg-btn.ghost { background: transparent; color: var(--fg); border: 1px solid var(--line); }
  .srv-list { display: flex; flex-direction: column; gap: .4rem; padding: .5rem 0; }
  .srv-row { display: flex; align-items: center; gap: .6rem; padding: .6rem .7rem;
             border: 1px solid var(--line); border-radius: .6rem; background: var(--bg); cursor: pointer; }
  .srv-row.offline { opacity: .45; }
  .srv-row.on { border-color: var(--orange); }
  .srv-dot { width: .6rem; height: .6rem; border-radius: 50%; background: var(--grey); flex: 0 0 auto; }
  .srv-row.online .srv-dot { background: var(--green); }
  .srv-meta { flex: 1 1 auto; min-width: 0; }
  .srv-name { font-weight: 600; font-size: .95rem; }
  .srv-url { font-size: .75rem; opacity: .55; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .srv-badge { font-size: .6rem; letter-spacing: .05em; padding: .15rem .4rem; border-radius: .3rem;
               background: var(--line); text-transform: uppercase; }
  .srv-tok { display: flex; gap: .4rem; padding: .1rem 0 .5rem; }
  .srv-tok.hidden { display: none; }
  .srv-tok input { flex: 1 1 auto; background: var(--bg); color: var(--fg);
                   border: 1px solid var(--line); border-radius: .5rem; padding: .4rem .5rem; font: inherit; }
  .srv-actions { display: flex; gap: .5rem; }
  .srv-add { display: flex; flex-direction: column; gap: .4rem; padding: .2rem 0 .6rem; }
  .srv-add.hidden { display: none; }
  .srv-add input { background: var(--bg); color: var(--fg); border: 1px solid var(--line);
                   border-radius: .5rem; padding: .5rem; font: inherit; }
  .gate { margin: auto; padding: 1.5rem; text-align: center; max-width: 22rem; }
  .gate.hidden { display: none; }
  .gate-title { font-size: 1.1rem; font-weight: 600; margin-bottom: .3rem; }
  .gate-sub { font-size: .85rem; opacity: .6; margin-bottom: 1rem; }
  #gate ~ #log.hidden { display: none; }

  footer { flex: 0 0 auto; padding: .9rem 1rem calc(.9rem + env(safe-area-inset-bottom)); border-top: 1px solid var(--line); }
  footer.hidden { display: none; }
  #talk {
    width: 100%; height: 4rem; border: none; border-radius: 1.2rem; cursor: pointer;
    color: #fff; font-size: 1.2rem; font-weight: 600; letter-spacing: .02em; touch-action: none;
    background: linear-gradient(180deg, #ffb340, var(--orange));
    box-shadow: 0 6px 22px rgba(255,153,0,.22);
    transition: transform .08s ease, box-shadow .15s, background .15s;
  }
  #talk.holding {
    background: linear-gradient(180deg, #3fe0a0, var(--green));
    box-shadow: 0 0 0 6px rgba(23,184,119,.15), 0 6px 22px rgba(23,184,119,.3);
    transform: scale(.99);
  }
</style>
</head>
<body>
  <header>
    <span class="brand">🤖 Reachy</span>
    <div id="status" data-state="idle" role="status" aria-live="polite">
      <span id="dot"></span><span id="label">Ready</span>
    </div>
  </header>

  <nav class="seg">
    <button class="seg-btn on" data-tab="talk">Talk</button>
    <button class="seg-btn" data-tab="settings">Settings</button>
  </nav>

  <main>
    <section id="tab-talk" class="tab" data-tab="talk">
      <div id="gate" class="gate hidden">
        <div class="gate-title">🧠 Pick a brain to start</div>
        <div class="gate-sub">Reachy isn't connected to a Mac yet.</div>
        <div id="gate-list" class="srv-list"></div>
        <button id="gate-settings" class="cfg-btn">Open server settings</button>
      </div>
      <div id="log"><div id="empty">Hold the button and say something to Reachy…</div></div>
    </section>
    <section id="tab-settings" class="tab hidden" data-tab="settings">
      <div id="cfg">
        <p id="cfg-note" class="cfg-note">Loading settings…</p>

        <div class="cfg-group">
          <div class="cfg-label">Server connection</div>
          <div id="srv-list" class="srv-list"></div>
          <p id="srv-note" class="cfg-note">Looking for connector Macs…</p>
          <div class="srv-actions">
            <button id="srv-rescan" class="cfg-btn ghost">⟳ Rescan</button>
            <button id="srv-addtoggle" class="cfg-btn ghost">＋ Add by address</button>
          </div>
          <div id="srv-add" class="srv-add hidden">
            <input id="srv-add-url" type="text" placeholder="http://192.168.1.20:8080" />
            <input id="srv-add-token" type="password" placeholder="token" />
            <button id="srv-add-go" class="cfg-btn">Connect</button>
          </div>
        </div>

        <div class="cfg-group">
          <label class="cfg-row">
            <span>Reply timeout <em>(seconds)</em></span>
            <input type="number" min="1" max="600" step="1" data-cfg="request_timeout_s" disabled />
          </label>
          <label class="cfg-row">
            <span>Max utterance <em>(seconds)</em></span>
            <input type="number" min="1" max="120" step="1" data-cfg="max_utterance_s" disabled />
          </label>
          <label class="cfg-row">
            <span>Log level</span>
            <select data-cfg="log_level" disabled>
              <option>DEBUG</option><option>INFO</option><option>WARNING</option>
              <option>ERROR</option><option>CRITICAL</option>
            </select>
          </label>
        </div>

        <div class="cfg-group">
          <div class="cfg-label">Advanced</div>
          <label class="cfg-row">
            <span>Audio pipeline <em>(restarts the app)</em></span>
            <select data-cfg="reachy_media_backend" disabled>
              <option>default</option><option>local</option><option>webrtc</option>
            </select>
          </label>
          <button id="cfg-restart" class="cfg-btn" disabled>Save &amp; restart app</button>
        </div>
      </div>
    </section>
  </main>

  <footer id="talk-footer">
    <button id="talk">Hold to talk</button>
  </footer>

<script>
  // ---- dashboard theme params (?embedded=1&theme=dark|light&accent=RRGGBB&bg=..&fg=..) ----
  const Q = new URLSearchParams(location.search);
  (function applyTheme() {
    const theme = Q.get("theme");
    if (theme === "light" || theme === "dark") document.documentElement.setAttribute("data-theme", theme);
    const setVar = (name, key, hash) => {
      const v = Q.get(key);
      if (v) document.documentElement.style.setProperty(name, (hash ? "#" : "") + v);
    };
    setVar("--accent", "accent", true); setVar("--orange", "accent", true);
    setVar("--bg", "bg", true); setVar("--fg", "fg", true);
  })();

  // ---- tab switching ----
  const footer = document.getElementById("talk-footer");
  document.querySelectorAll(".seg-btn").forEach(b => b.addEventListener("click", () => {
    const tab = b.dataset.tab;
    document.querySelectorAll(".seg-btn").forEach(x => x.classList.toggle("on", x === b));
    document.querySelectorAll("main .tab").forEach(s => s.classList.toggle("hidden", s.dataset.tab !== tab));
    footer.classList.toggle("hidden", tab !== "talk");
  }));

  // ---- hold-to-talk + live status/history (unchanged behaviour) ----
  const statusEl = document.getElementById("status");
  const labelEl  = document.getElementById("label");
  const logEl    = document.getElementById("log");
  const btn      = document.getElementById("talk");
  let held = false, lastSeq = -1;

  const TOKEN = Q.get("token") || "";
  const AUTH = TOKEN ? { "X-Auth-Token": TOKEN } : {};

  const LABELS = { idle: "Ready", listening: "Listening…", thinking: "Thinking…",
                   speaking: "Speaking…", error: "Error", offline: "Offline",
                   parked: "No server" };
  function renderStatus(state) {
    statusEl.dataset.state = state; labelEl.textContent = LABELS[state] || state;
    if (typeof applyGate === "function") applyGate(state);
  }

  async function post(path) {
    try { await fetch(path, { method: "POST", headers: AUTH, keepalive: true }); }
    catch (e) { renderStatus("offline"); }
  }
  function down(e) { e.preventDefault(); if (held) return;
    held = true; btn.classList.add("holding"); btn.textContent = "Listening…"; post("/press"); }
  function up(e) { if (e) e.preventDefault(); if (!held) return;
    held = false; btn.classList.remove("holding"); btn.textContent = "Hold to talk"; post("/release"); }
  btn.addEventListener("pointerdown", down);
  btn.addEventListener("pointerup", up);
  btn.addEventListener("pointerleave", up);
  btn.addEventListener("pointercancel", up);
  document.addEventListener("visibilitychange", () => { if (document.hidden) up(); });

  function bubble(cls, who, text) {
    const d = document.createElement("div"); d.className = "msg " + cls;
    const w = document.createElement("span"); w.className = "who"; w.textContent = who;
    d.appendChild(w); d.appendChild(document.createTextNode(text)); return d;
  }
  function renderHistory(turns) {
    const nearBottom = logEl.scrollHeight - logEl.scrollTop - logEl.clientHeight < 80;
    logEl.innerHTML = "";
    if (!turns.length) {
      const e = document.createElement("div"); e.id = "empty";
      e.textContent = "Hold the button and say something to Reachy…";
      logEl.appendChild(e); return;
    }
    for (const t of turns) {
      if (t.you)   logEl.appendChild(bubble("you", "You", t.you));
      if (t.reply) logEl.appendChild(bubble("reachy", "Reachy", t.reply));
    }
    if (nearBottom) logEl.scrollTop = logEl.scrollHeight;
  }

  async function pollStatus() {
    try { renderStatus((await (await fetch("/status", { headers: AUTH, cache: "no-store" })).json()).state); }
    catch (e) { renderStatus("offline"); }
  }
  async function pollHistory() {
    try {
      const data = await (await fetch("/history", { headers: AUTH, cache: "no-store" })).json();
      if (data.seq !== lastSeq) { lastSeq = data.seq; renderHistory(data.turns); }
    } catch (e) { /* keep last render */ }
  }
  setInterval(pollStatus, 350);
  setInterval(pollHistory, 1000);
  pollStatus(); pollHistory();

  // ---- Settings config panel (settings_app origin only; degrades on the phone page) ----
  const cfgNote = document.getElementById("cfg-note");
  const cfgInputs = Array.from(document.querySelectorAll("[data-cfg]"));
  const cfgRestart = document.getElementById("cfg-restart");
  let cfgLoaded = false;

  function cfgSet(enabled, note, isErr) {
    cfgInputs.forEach(el => { el.disabled = !enabled; });
    if (cfgRestart) cfgRestart.disabled = !enabled;
    if (note !== undefined) { cfgNote.textContent = note; cfgNote.classList.toggle("err", !!isErr); }
  }

  async function cfgLoad() {
    if (cfgLoaded) return;
    try {
      const data = await (await fetch("/config", { headers: AUTH, cache: "no-store" })).json();
      cfgInputs.forEach(el => { if (el.dataset.cfg in data) el.value = data[el.dataset.cfg]; });
      cfgSet(true, "Changes apply live. Audio pipeline needs a restart.", false);
      cfgLoaded = true;
    } catch (e) {
      cfgSet(false, "Settings are available inside the Reachy desktop app.", true);
    }
  }

  async function cfgPost(field, value) {
    cfgNote.classList.remove("err");
    try {
      const res = await fetch("/config", {
        method: "POST", headers: { "Content-Type": "application/json", ...AUTH },
        body: JSON.stringify({ [field]: value }),
      });
      const out = await res.json();
      if (!res.ok || !out.ok) { cfgNote.textContent = out.error || "Rejected"; cfgNote.classList.add("err"); return null; }
      cfgNote.textContent = "Saved.";
      return out;
    } catch (e) { cfgNote.textContent = "Save failed"; cfgNote.classList.add("err"); return null; }
  }

  cfgInputs.forEach(el => el.addEventListener("change", () => {
    if (el.dataset.cfg === "reachy_media_backend") return;  // restart-gated; handled below
    cfgPost(el.dataset.cfg, el.type === "number" ? Number(el.value) : el.value);
  }));

  if (cfgRestart) cfgRestart.addEventListener("click", async () => {
    const mb = cfgInputs.find(el => el.dataset.cfg === "reachy_media_backend");
    const out = await cfgPost("reachy_media_backend", mb ? mb.value : "default");
    if (!out) return;
    cfgNote.textContent = "Restarting the app…";
    try { await fetch("/restart-app", { method: "POST", headers: AUTH }); } catch (e) { /* app is going down */ }
  });

  // load config the first time Settings is opened
  document.querySelector('.seg-btn[data-tab="settings"]').addEventListener("click", cfgLoad);

  // ---- server picker (Settings) + parked gate (Talk) ----
  const srvList = document.getElementById("srv-list");
  const srvNote = document.getElementById("srv-note");
  const gate = document.getElementById("gate");
  const gateList = document.getElementById("gate-list");
  let srvState = { discovered: [], saved: [], selected_id: null };

  function srvRow(s, online, selected) {
    const row = document.createElement("div");
    row.className = "srv-row" + (online ? " online" : " offline") + (selected ? " on" : "");
    const dot = document.createElement("span"); dot.className = "srv-dot";
    const meta = document.createElement("div"); meta.className = "srv-meta";
    const nm = document.createElement("div"); nm.className = "srv-name"; nm.textContent = s.name || s.id;
    const u = document.createElement("div"); u.className = "srv-url"; u.textContent = s.url || "";
    meta.appendChild(nm); meta.appendChild(u);
    row.appendChild(dot); row.appendChild(meta);
    if (selected) { const b = document.createElement("span"); b.className = "srv-badge"; b.textContent = "last used"; row.appendChild(b); }
    row.addEventListener("click", () => srvSelect(s, row));
    return row;
  }

  function renderServers(target) {
    if (!target) return;
    target.innerHTML = "";
    const online = new Set(srvState.discovered.map(d => d.id));
    const merged = [];
    srvState.discovered.forEach(d => merged.push(d));
    srvState.saved.forEach(s => { if (!online.has(s.id)) merged.push(s); });
    if (!merged.length) {
      srvNote && (srvNote.textContent = "No connector Macs found. Use ＋ Add by address.");
      return;
    }
    merged.forEach(s => target.appendChild(srvRow(s, online.has(s.id), s.id === srvState.selected_id)));
    srvNote && (srvNote.textContent = "Tap a Mac to connect.");
  }

  async function srvLoad() {
    try {
      srvState = await (await fetch("/servers", { headers: AUTH, cache: "no-store" })).json();
      renderServers(srvList); renderServers(gateList);
    } catch (e) {
      srvNote && (srvNote.textContent = "Server list unavailable here.");
    }
  }

  async function srvPost(path, body) {
    try {
      const res = await fetch(path, {
        method: "POST", headers: { "Content-Type": "application/json", ...AUTH },
        body: JSON.stringify(body),
      });
      return { ok: res.ok, data: await res.json().catch(() => ({})) };
    } catch (e) { return { ok: false, data: { error: "unreachable" } }; }
  }

  async function srvSelect(s, row) {
    // Ask for a token only when we have none stored, or the server rejected the last one.
    let token = "";
    if (s.has_token === false || row.dataset.needsToken === "1") {
      const box = document.createElement("div"); box.className = "srv-tok";
      const inp = document.createElement("input"); inp.type = "password"; inp.placeholder = "token";
      const go = document.createElement("button"); go.className = "cfg-btn"; go.textContent = "Connect";
      box.appendChild(inp); box.appendChild(go); row.after(box); inp.focus();
      go.addEventListener("click", async () => {
        const out = await srvPost("/servers/select", { id: s.id, url: s.url, token: inp.value });
        box.remove();
        if (!out.ok) { row.dataset.needsToken = "1"; srvNote && (srvNote.textContent = out.data.error || "Rejected"); }
        else { srvNote && (srvNote.textContent = "Connected."); srvLoad(); }
      });
      return;
    }
    srvNote && (srvNote.textContent = "Connecting…");
    const out = await srvPost("/servers/select", { id: s.id, url: s.url, token });
    if (!out.ok) { row.dataset.needsToken = "1"; srvNote && (srvNote.textContent = out.data.error || "Rejected"); }
    else { srvNote && (srvNote.textContent = "Connected."); srvLoad(); }
  }

  const srvRescan = document.getElementById("srv-rescan");
  if (srvRescan) srvRescan.addEventListener("click", async () => {
    srvNote && (srvNote.textContent = "Rescanning…");
    await srvPost("/servers/rescan", {}); setTimeout(srvLoad, 1200);
  });
  const srvAddToggle = document.getElementById("srv-addtoggle");
  if (srvAddToggle) srvAddToggle.addEventListener("click", () =>
    document.getElementById("srv-add").classList.toggle("hidden"));
  const srvAddGo = document.getElementById("srv-add-go");
  if (srvAddGo) srvAddGo.addEventListener("click", async () => {
    const url = document.getElementById("srv-add-url").value.trim();
    const tok = document.getElementById("srv-add-token").value;
    if (!url) return;
    srvNote && (srvNote.textContent = "Connecting…");
    const out = await srvPost("/servers/add", { url, token: tok });
    srvNote && (srvNote.textContent = out.ok ? "Connected." : (out.data.error || "Rejected"));
    if (out.ok) { document.getElementById("srv-add").classList.add("hidden"); srvLoad(); }
  });
  const gateSettings = document.getElementById("gate-settings");
  if (gateSettings) gateSettings.addEventListener("click", () =>
    document.querySelector('.seg-btn[data-tab="settings"]').click());

  // show the gate whenever the app is parked (no brain bound)
  function applyGate(state) {
    const parked = state === "parked";
    gate.classList.toggle("hidden", !parked);
    logEl.classList.toggle("hidden", parked);
    footer.classList.toggle("hidden", parked || document.querySelector('.seg-btn.on').dataset.tab !== "talk");
    if (parked && !gateList.children.length) srvLoad();
  }

  document.querySelector('.seg-btn[data-tab="settings"]').addEventListener("click", srvLoad);
  srvLoad();
</script>
</body>
</html>
